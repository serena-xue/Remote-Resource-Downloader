name: Stealth Secure Downloader
on:
  repository_dispatch:
    types: [trigger_download]

jobs:
  relay:
    runs-on: ubuntu-latest
    timeout-minutes: 480
    
    steps:
      - name: Mask and Set Environment
        run: |
          # 将 API 传入的 URL 立即加入掩码，防止日志泄露
          TARGET_URL="${{ github.event.client_payload.target_url }}"
          echo "::add-mask::$TARGET_URL"
          echo "TARGET_URL=$TARGET_URL" >> $GITHUB_ENV
          
          # 处理文件名，默认为 secure_payload
          FNAME="${{ github.event.client_payload.file_name }}"
          echo "OUTPUT_NAME=${FNAME:-secure_payload}" >> $GITHUB_ENV

      - name: Remote Fetch
        run: |
          # 使用 curl 开启重试与断点续传
          curl -L --retry 5 --retry-delay 10 -s -o "raw_source.tmp" "$TARGET_URL"

      - name: AES-256 Encryption
        env:
          GPG_PASS: ${{ secrets.FILE_ENCRYPT_KEY }}
        run: |
          # 使用 GPG 2.x 进行对称加密，强制使用 AES256
          echo "$GPG_PASS" | gpg --batch --yes --passphrase-fd 0 \
            --symmetric --cipher-algo AES256 \
            --output "${{ env.OUTPUT_NAME }}.gpg" \
            raw_source.tmp
          
          # 生成完整性校验和
          sha256sum "${{ env.OUTPUT_NAME }}.gpg" > checksum.txt

      - name: Artifact Distribution
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.OUTPUT_NAME }}-bundle
          path: |
            *.gpg
            checksum.txt
          retention-days: 1
